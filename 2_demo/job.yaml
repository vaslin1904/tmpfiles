apiVersion: batch/v1
kind: Job
metadata:
  name: example-job
  namespace: default
  labels:
    app: app
spec:
  backoffLimit: 4
  template:
    metadata:
      name: app
      labels:
        app: app
    spec:
      containers:
      - name: job
        image: python:3
        # command: ['sh', '-c', 'sleep 5; false']
        command: ['sh', '-c', 'sleep 5; python3 -c "import math; print(round(math.pi, 10000000000000000000000000))"']
      restartPolicy: OnFailure
        # restartPolicy: Never
