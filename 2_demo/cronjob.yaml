apiVersion: batch/v1
kind: CronJob
metadata:
  name: example-cronjob
  namespace: default
spec:
  schedule: "*/2 * * * *"
  jobTemplate:
    spec:
      template:
        metadata:
          name: app
          labels:
            app: app
        spec:
          containers:
          - name: job
            image: python:3
            command: ['sh', '-c', 'sleep 5; python3 -c "import math; print(round(math.pi, 10000000000000000000000000))"']
          restartPolicy: Never
