apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name:  example-replicaset-1
  namespace: default
  labels:
    app:  otus
spec:
  selector:
    matchLabels:
      app: otus-1
  replicas: 3
  template:
    metadata:
      labels:
        app: otus-1
    spec:
      containers:
      - name:  app
        # image: debian:12.4-slim
        image: debian:12.2-slim
        command:
            - /bin/bash
            - -c
            - 'echo "I am pod from ReplicaSet"; while true; do true; done'
