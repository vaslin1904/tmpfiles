server {
    listen       80;
    server_name  localhost;

#localhost;
        
    #access_log  /var/log/angie/host.access.log  main;
    #location - префиксный без модификатора
        root   /usr/share/angie/html;
        index  index.html index.htm;
    
    #return 302 http://mysite.ru$request_uri;
    
    location / {
      try_files $uri $uri/ =404;     
    }

    location /status/ {
        api     /status/;
        allow   127.0.0.1;
        deny    all;
    }

    
    #Location - регулярные выражения. Обработка картинок. Поиск по регуляркt.Кэширование на 30 дней
    location ~* \.(?:jpeg|jpg|png|svg)$ {
        expires 30d;	
        add_header X-Info $map_var;       
   }
    # Префиксный location
 #
   location /assets/ {
       expires 30d;  
   } 

   location ^~ /assets/css/ {
       add_header X-Info $map_var;
   } 
   
   location /error/ {
       internal;
    }
    # redirect server error pages to the static page /50x.html
    #
    error_page   500 502 503 504 404  /error/index.html;
    
    location = /error/index.html {
        internal;
    }

    # proxy the PHP scripts to Apache listening on 127.0.0.1:80
    #
    #location ~ \.php$ {
    #    proxy_pass   http://127.0.0.1;
    #}

    # pass the PHP scripts to FastCGI server listening on 127.0.0.1:9000
    #
    #location ~ \.php$ {
    #    root           html;
    #    fastcgi_pass   127.0.0.1:9000;
    #    fastcgi_index  index.php;
    #    fastcgi_param  SCRIPT_FILENAME  /scripts$fastcgi_script_name;
    #    include        fastcgi_params;
    #}

    # deny access to .htaccess files, if Apache's document root
    # concurs with angie's one
    #
    #location ~ /\.ht {
    #    deny  all;
    #}
}

